<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>My Account | Thulira</title>
<meta content="Manage your Thulira profile and view your booking history." name="description"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<link crossorigin="anonymous" href="https://cdn.prod.website-files.com/6978c74eb7a56e10b85274cb/css/modus-projects-6db04b.webflow.shared.e97910e78.min.css" integrity="sha384-6XkQ54zt5ZhQdYI3Cx7JctA/Nr8ro5njqFDfYJJIYwhTuj2/ibnU3ZsiTqnERiYm" rel="stylesheet" type="text/css"/>
<link crossorigin="anonymous" href="https://cdn.prod.website-files.com/6978c74eb7a56e10b85274cb/css/modus-projects-6db04b.webflow.69c3b278cebe0890cc1deff6.279609e48.opt.min.css" integrity="sha384-J5YJ5IODQP3dWDCguNMeegsI+pxEg3y/1oh76z8WYZOLOF8Mz4zlr2auNzYvFebx" rel="stylesheet" type="text/css"/>
<link href="ecommerce.css?v=999?v=999" rel="stylesheet"/>
<script type="text/javascript">
    !function(o,c){var n=c.documentElement,t=" w-mod-";n.className+=t+"js",("ontouchstart"in o||o.DocumentTouch&&c instanceof DocumentTouch)&&(n.className+=t+"touch")}(window,document);
  </script>
<link href="https://cdn.prod.website-files.com/6978c74eb7a56e10b85274cb/6997158e5fac364205ad5ab5_Favicon.png" rel="shortcut icon" type="image/x-icon"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer="" src="supabaseClient.js?v=2"></script>
<script defer="" src="cart.js?v=3"></script>

<style>
  /* Prevent Webflow scaling down interaction on the page content */
  .page__wrapper,
  .main__wrapper,
  main,
  body {
    transform: none !important;
    scale: none !important;
  }

  .account-grid {
    display: grid;
    grid-template-columns: 350px 1fr;
    gap: 2.5rem;
    align-items: start;
  }

  @media (max-width: 991px) {
    .account-grid {
      grid-template-columns: 1fr;
      gap: 2rem;
    }
  }

  .account-panel {
    background: var(--thulira-bg-card, #111);
    border: 1px solid var(--thulira-border, rgba(255, 255, 255, 0.08));
    border-radius: 8px;
    padding: 1.75rem;
    color: var(--thulira-text-light, #fff);
  }

  .account-panel h2 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-top: 0;
    margin-bottom: 1.5rem;
    color: white;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    padding-bottom: 0.75rem;
  }

  .profile-form-group {
    margin-bottom: 1.25rem;
  }

  .profile-form-group label {
    display: block;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--thulira-text-muted, #aaa);
    margin-bottom: 0.5rem;
    font-weight: 600;
  }

  .profile-input {
    width: 100%;
    padding: 0.8rem;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--thulira-border, rgba(255, 255, 255, 0.08));
    border-radius: 4px;
    color: white;
    font-family: inherit;
    font-size: 0.95rem;
    transition: border-color 0.2s ease;
  }

  .profile-input:focus {
    border-color: var(--thulira-orange, #f78c44);
    outline: none;
  }

  .profile-input:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    background: rgba(0, 0, 0, 0.2);
  }

  .btn-save-profile {
    width: 100%;
    padding: 0.8rem;
    background: var(--thulira-orange, #f78c44);
    color: black;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    transition: opacity 0.2s ease;
    font-size: 0.95rem;
  }

  .btn-save-profile:hover {
    opacity: 0.9;
  }

  .btn-signout {
    width: 100%;
    padding: 0.8rem;
    background: transparent;
    color: #ff6b6b;
    border: 1px solid rgba(255, 107, 107, 0.3);
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    margin-top: 1rem;
    transition: all 0.2s ease;
    font-size: 0.95rem;
  }

  .btn-signout:hover {
    background: rgba(255, 107, 107, 0.08);
    border-color: #ff6b6b;
  }

  .save-success-msg {
    color: #4caf50;
    font-size: 0.9rem;
    margin-top: 0.75rem;
    text-align: center;
    display: none;
  }
</style>

</head>
<body>
<div class="page__wrapper">
<!-- Navbar Component -->
<div class="nav__component" data-nav-element="">
<div class="nav__wrapper" data-nav-wrapper="">
<div class="nav__flex">
<div class="nav__left">
<a class="nav__link" href="/about">About Us</a>
<a class="nav__link" href="/blog">Blog</a>
</div>
<div class="nav__center">
<a class="nav__logo w-inline-block" href="/"><img src="/thulira-transparent.png" alt="Thulira Logo" style="height: 32px; width: auto; display: block;" /></a>
</div>
<div class="nav__right">
<div data-hide-landscape="">
<a class="button w-inline-block" href="/shop"><div>Shop Now</div></a>
</div>

</div>
</div>
<div class="nav__menu-wrapper" data-menu-wrapper="">
<nav class="nav__menu-inner">
<ul class="w-list-unstyled" role="list">
<li><a class="nav__menu-link" href="/">Home</a></li>
<li><a class="nav__menu-link" href="/shop">Shop</a></li>
<li><a class="nav__menu-link" href="/blog">Blog</a></li>
<li><a class="nav__menu-link" href="/about">About Us</a></li>

</ul>
</nav>
</div>
</div>
</div>

<!-- Core Dashboard Panel -->
<main style="min-height: 85vh; background: var(--thulira-bg-dark); padding-top: 6rem;">
<div class="orders-page-container">
  <div class="orders-page-header">
    <h1>My Account</h1>
  </div>
  
  <div class="account-grid">
    <!-- Left Column: Profile Card -->
    <div class="account-panel">
      <h2>Profile Details</h2>
      <form id="profileForm">
        <div class="profile-form-group">
          <label for="profilePhone">Sign Up Number</label>
          <input class="profile-input" id="profilePhone" type="text" disabled />
        </div>
        <div class="profile-form-group">
          <label for="profileName">Full Name</label>
          <input class="profile-input" id="profileName" type="text" placeholder="Enter your full name" required />
        </div>
        <div class="profile-form-group">
          <label for="profileAddress">Default Shipping Address</label>
          <textarea class="profile-input" id="profileAddress" rows="3" placeholder="Enter your default shipping address" style="resize: vertical; min-height: 80px;" required></textarea>
        </div>
        <button class="btn-save-profile" id="btnSaveProfile" type="submit">Save Changes</button>
        <div class="save-success-msg" id="saveSuccessMsg">Profile updated successfully!</div>
      </form>
      <button class="btn-signout" id="btnSignOut">Sign Out</button>
    </div>

    <!-- Right Column: Booking History -->
    <div>
      <div style="margin-bottom: 1.5rem;">
        <h2 style="font-size: 1.4rem; font-weight: 700; margin: 0; color: white;">Booking History</h2>
      </div>
      <div class="orders-list" id="ordersList">
        <!-- Dynamic Order cards -->
      </div>
      <div class="no-orders-box" id="emptyOrdersBox" style="display: none; background: var(--thulira-bg-card); border: 1px solid var(--thulira-border); border-radius: 8px;">
        <svg fill="none" height="48" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewbox="0 0 24 24" width="48" xmlns="http://www.w3.org/2000/svg">
          <rect height="18" rx="2" ry="2" width="18" x="3" y="4"></rect>
          <line x1="16" x2="16" y1="2" y2="6"></line>
          <line x1="8" x2="8" y1="2" y2="6"></line>
          <line x1="3" x2="21" y1="10" y2="10"></line>
        </svg>
        <h2 style="color: white; margin:0;">No Bookings Found</h2>
        <p>You haven't booked any Sustainable Home Products yet.</p>
        <a class="button-link primary" href="/shop">Browse Services</a>
      </div>
    </div>
  </div>
</div>
</main>
</div>

<script>
  document.addEventListener('DOMContentLoaded', async () => {
    if (window.initSupabase) await window.initSupabase();
    
    const { data: { user } } = await window.supabaseClient.auth.getUser();
    if (!user) {
      window.location.href = 'index.html';
      return;
    }

    // Populate user profile info
    const phoneVal = user.phone || user.user_metadata?.phone || '';
    document.getElementById('profilePhone').value = phoneVal;

    // Fetch profile details from db or fallback to user metadata
    let profileName = user.user_metadata?.full_name || '';
    let profileAddress = user.user_metadata?.address || '';

    // Fetch from profiles table
    try {
      const { data: profile } = await window.supabaseClient
        .from('profiles')
        .select('full_name')
        .eq('id', user.id)
        .single();
      
      if (profile && profile.full_name) {
        profileName = profile.full_name;
      }
    } catch (e) {
      console.warn('Could not load profiles table:', e.message);
    }

    // Fetch latest address from orders table if user metadata is empty
    if (!profileAddress) {
      try {
        const { data: orders } = await window.supabaseClient
          .from('orders')
          .select('shipping_address, customer_name')
          .eq('user_id', user.id)
          .order('created_at', { ascending: false })
          .limit(1);

        if (orders && orders.length > 0) {
          profileAddress = orders[0].shipping_address || '';
          if (!profileName) {
            profileName = orders[0].customer_name || '';
          }
        }
      } catch (e) {
        console.warn('Could not load latest order details:', e.message);
      }
    }

    document.getElementById('profileName').value = profileName;
    document.getElementById('profileAddress').value = profileAddress;

    // Save changes action
    const profileForm = document.getElementById('profileForm');
    const saveBtn = document.getElementById('btnSaveProfile');
    const successMsg = document.getElementById('saveSuccessMsg');

    profileForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';
      successMsg.style.display = 'none';

      const newName = document.getElementById('profileName').value.trim();
      const newAddress = document.getElementById('profileAddress').value.trim();

      try {
        // 1. Update user metadata
        const { error: metaError } = await window.supabaseClient.auth.updateUser({
          data: {
            full_name: newName,
            address: newAddress
          }
        });

        if (metaError) throw metaError;

        // 2. Try to update/upsert profiles table
        try {
          await window.supabaseClient
            .from('profiles')
            .upsert({
              id: user.id,
              full_name: newName,
              phone: phoneVal
            });
        } catch (pe) {
          console.warn('Silent warning updating profiles table:', pe.message);
        }

        successMsg.style.display = 'block';
        setTimeout(() => {
          successMsg.style.display = 'none';
        }, 4000);
      } catch (err) {
        alert('Failed to update profile: ' + err.message);
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Changes';
      }
    });

    // Sign Out action
    document.getElementById('btnSignOut').addEventListener('click', async () => {
      if (confirm('Are you sure you want to sign out?')) {
        await window.supabaseClient.auth.signOut();
        window.location.href = 'index.html';
      }
    });

    // Populate Booking History
    const listDiv = document.getElementById('ordersList');
    const emptyDiv = document.getElementById('emptyOrdersBox');

    try {
      const { data: orders, error } = await window.supabaseClient
        .from('orders')
        .select('*, order_items(*)')
        .eq('user_id', user.id)
        .order('created_at', { ascending: false });
        
      if (error || !orders || orders.length === 0) {
        listDiv.style.display = 'none';
        emptyDiv.style.display = 'flex';
        return;
      }
      
      let html = '';

      function escapeHTML(str) {
        if (str === null || str === undefined) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }
      
      orders.forEach(order => {
        let statusText = order.status.toUpperCase();
        let statusClass = order.status === 'pending' ? 'status-pending' :
                          order.status === 'confirmed' ? 'status-confirmed' :
                          order.status === 'delivered' ? 'status-completed' : 'status-cancelled';
        
        let dateString = new Date(order.created_at).toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });

        let itemsHtml = '';
        if (order.order_items) {
          order.order_items.forEach(item => {
            let variantStr = '';
            if (item.size && item.color) {
              variantStr = `${item.size} / ${item.color}`;
            } else if (item.size) {
              variantStr = item.size;
            } else if (item.color) {
              variantStr = item.color;
            }
            itemsHtml += `
              <div class="order-item-row" style="display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; font-size: 0.95rem;">
                <div class="order-item-desc" style="display: flex; align-items: center; gap: 0.5rem;">
                  <span class="order-item-qty-badge" style="background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; font-size: 0.8rem;">x${item.quantity}</span>
                  <span style="font-weight:600; color: white;">${escapeHTML(item.product_title)}</span>
                  ${variantStr ? `<span class="cart-item-size-badge" style="background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.08);">${escapeHTML(variantStr)}</span>` : ''}
                </div>
                <span style="font-weight:700; color: white;">₹${item.unit_price * item.quantity}</span>
              </div>
            `;
          });
        }

        html += `
          <div class="order-card" style="margin-bottom: 1.5rem;">
            <div class="order-card-header">
              <div class="order-header-info">
                <div class="order-meta-item">
                  <span class="order-meta-label">Order ID</span>
                  <span class="order-meta-val" style="color:var(--thulira-orange);">${escapeHTML(order.id.split('-')[0])}...</span>
                </div>
                <div class="order-meta-item">
                  <span class="order-meta-label">Date Placed</span>
                  <span class="order-meta-val">${escapeHTML(dateString)}</span>
                </div>
                <div class="order-meta-item">
                  <span class="order-meta-label">Total Amount</span>
                  <span class="order-meta-val">₹${order.total}</span>
                </div>
              </div>
              <span class="order-status-pill ${statusClass}" style="text-transform: uppercase;">${escapeHTML(statusText)}</span>
            </div>
            
            <div class="order-card-body" style="padding: 1.5rem;">
              <h3 style="margin-top:0; font-size:1.05rem; text-transform:uppercase; color:var(--thulira-text-muted); font-weight:700; margin-bottom:1rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom:0.4rem;">Items Ordered</h3>
              <div class="order-items-grid">
                ${itemsHtml}
              </div>
              
              <h3 style="margin-top:1.5rem; font-size:1.05rem; text-transform:uppercase; color:var(--thulira-text-muted); font-weight:700; margin-bottom:1rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom:0.4rem;">Delivery Details</h3>
              <div style="display:grid; grid-template-columns: 1fr; gap:0.8rem; font-size:0.95rem;">
                <div><strong>Address:</strong> ${escapeHTML(order.shipping_address)}</div>
                <div style="display:flex; gap:2rem; flex-wrap:wrap; color:var(--thulira-text-muted); font-size:0.9rem;">
                  <div><strong>Contact Name:</strong> ${escapeHTML(order.customer_name)}</div>
                  <div><strong>Contact Phone:</strong> ${escapeHTML(order.customer_phone)}</div>
                </div>
              </div>
            </div>
          </div>
        `;
      });
      
      listDiv.innerHTML = html;
    } catch (err) {
      console.error('Failed to render bookings list:', err.message);
      listDiv.style.display = 'none';
      emptyDiv.style.display = 'flex';
    }
  });
</script>
</body>
</html>
